  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lor:#23262e;background:#fff;box-sizing:border-box;outline:none;transition:border-color .15s,box-shadow .15s;\" style-focus=\"border-color:#16245d;box-shadow:0 0 0 3px rgba(22,36,93,.13);\">\n        <\u002Fdiv>\n        <sc-if value=\"{{ loginError }}\">\n          <div style=\"background:#fdecea;border:1px solid #f3c2bc;color:#a12f22;border-radius:9px;padding:11px 14px;font-size:14px;\">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง<\u002Fdiv>\n        <\u002Fsc-if>\n        <button onclick=\"{{ doLogin }}\" style=\"width:100%;background:linear-gradient(160deg,#1a2a6b,#13204f);color:#fff;border:none;border-radius:10px;padding:14px 24px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 5px 14px rgba(20,30,70,.2);margin-top:4px;\">เข้าสู่ระบบ<\u002Fbutton>\n        <button onclick=\"{{ cancelLogin }}\" style=\"width:100%;background:none;border:none;color:#8a8576;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;padding:6px;\">‹ กลับสู่แบบฟอร์ม<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isSettings }}\" hint-placeholder-val=\"{{ false }}\">\n  <main style=\"max-width:780px;margin:0 auto;padding:clamp(20px,4vw,40px) clamp(15px,4vw,24px) 70px;\">\n    <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:22px;\">\n      <button onclick=\"{{ cancelSettings }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:#fff;color:#16245d;border:1px solid #d6d1c4;border-radius:9px;padding:10px 16px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;\" style-hover=\"background:#f0f1f7;\">‹ กลับสู่แบบฟอร์ม<\u002Fbutton>\n      <div style=\"flex:1 1 auto;min-width:0;\">\n        <h2 style=\"font-family:'Trirong',serif;font-size:clamp(20px,3.2vw,26px);font-weight:700;color:#16245d;line-height:1.3;\">ตั้งค่าแบบฟอร์ม<\u002Fh2>\n        <div style=\"font-size:14px;color:#8a8576;margin-top:2px;\">แก้ไขหัวข้อ th:0;\">\n          <label style=\"display:block;font-size:15px;font-weight:600;color:#16245d;margin-bottom:7px;\">หมายเหตุ<\u002Flabel>\n          <textarea value=\"{{ values.addNote }}\" onchange=\"{{ handlers.addNote }}\" rows=\"2\" placeholder=\"ข้อมูลเพิ่มเติม (ถ้ามี)\" style=\"width:100%;padding:12px 14px;border:1px solid #d6d1c4;border-radius:9px;font-size:16px;font-family:inherit;color:#23262e;background:#fff;box-sizing:border-box;outline:none;resize:vertical;transition:border-color .15s,box-shadow .15s;\" style-focus=\"border-color:#16245d;box-shadow:0 0 0 3px rgba(22,36,93,.13);\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <sc-if value=\"{{ hasError }}\">\n      <div style=\"background:#fdecea;border:1px solid #f3c2bc;color:#a12f22;border-radius:10px;padding:14px 18px;margin-bottom:18px;font-size:15px;\">กรุณากรอกข้อมูลในช่องที่มีเครื่องหมาย <span style=\"color:#c0392b;font-weight:700;\">*<\u002Fspan> ให้ครบถ้วน<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <button onclick=\"{{ submit }}\" style=\"width:100%;background:linear-gradient(160deg,#1a2a6b,#13204f);color:#fff;border:none;border-radius:12px;padding:16px 24px;font-size:18px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.02em;box-shadow:0 6px 18px rgba(20,30,70,.22);transition:transform .12s,box-shadow .12s;\" style-hover=\"transform:translateY(-1px);box-shadow:0 9px 24px rgba(20,30,70,.3);\" style-active=\"transform:translateY(0);\">{{ submitLabel }}<\u002Fbutton>\n    <div style=\"text-align:center;color:#8a8576;font-size:13px;margin-top:14px;\">ช่องที่มีเครื่องหมาย <span style=\"color:#c0392b;\">*<\u002Fspan> เป็นข้อมูลที่จำเป็นต้องกรอก<\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n  <main style=\"max-width:580px;margin:0 auto;padding:clamp(44px,9vw,84px) 22px;text-align:center;animation:opmRise .5s ease both;\">\n    <img src=\"542a7908-6647-4df6-a59a-a8ead8fd68a4\" alt=\"ตราสัญลักษณ์\" style=\"width:78px;height:auto;display:block;margin:0 auto 24px;border-radius:50%;background:#fff;padding:5px;box-shadow:0 6px 18px rgba(0,0,0,.12);\">\n    <div style=\"width:64px;height:64px;border-radius:50%;background:#16245d;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;\">\n      <span style=\"color:#e6c766;font-size:32px;line-height:1;font-weight:700;\">✓<\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Trirong',serif;font-size:clamp(22px,4vw,28px);font-weight:700;color:#16245d;margin-bottom:14px;line-height:1.35;\">{{ thankTitle }}<\u002Fh2>\n    <p style=\"font-size:clamp(15px,2.4vw,17px);color:#5a5d68;line-height:1.65;max-width:440px;margin:0 auto 30px;\">{{ thankBody }}<\u002Fp>\n    <button onclick=\"{{ reset }}\" style=\"background:#fff;color:#16245d;border:1.5px solid #16245d;border-radius:10px;padding:13px 30px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;\" style-hover=\"background:#f0f1f7;\">ส่งแบบตอบรับอีกฉบับ<\u002Fbutton>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <footer style=\"text-align:center;padding:24px 20px 40px;color:#9a958a;font-size:13px;line-height:1.6;\">\n    <div style=\"margin-bottom:12px;display:flex;flex-wrap:wrap;gap:8px 20px;justify-content:center;\">\n      <button onclick=\"{{ openSummary }}\" style=\"background:none;border:none;color:#16245d;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:6px;\">สำหรับเจ้าหน้าที่ · ดูสรุปรายชื่อผู้ตอบรับ<\u002Fbutton>\n      <button onclick=\"{{ openSettingsGated }}\" style=\"background:none;border:none;color:#16245d;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:6px;\">ตั้งค่าแบบฟอร์ม<\u002Fbutton>\n    <\u002Fdiv>\n    {{ orgName }} · แบบตอบรับการเข้าร่วมประชุมการตรวจราชการแบบบูรณาการ\n  <\u002Ffooter>\n\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 840, &quot;height&quot;: 1280 },\n  &quot;meetingTitle&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;แบบตอบรับการเข้าร่วมประชุมการตรวจราชการแบบบูรณาการ&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;subtitle&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;ของผู้ตรวจราชการสำนักนายกรัฐมนตรี และผู้ตรวจราชการกระทรวง&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;budgetYear&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;2569&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;orgName&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;สำนักนายกรัฐมนตรี&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;provinces&quot;: { &quot;editor&quot;: null, &quot;default&quot;: [&quot;นราธิวาส&quot;, &quot;ยะลา&quot;, &quot;ปัตตานี&quot;], &quot;tsType&quot;: &quot;string[]&quot; },\n  &quot;scriptUrl&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    form: { inspector:'', name:'', agency:'', phone:'', province:[], date:'', coordName:'', coordPos:'', coordPhone:'', coordNote:'', addName:'', addPos:'', addAgency:'', addPhone:'', addNote:'' },\n    errors: {},\n    submitted: false,\n    attempted: false,\n    yearOverride: null,\n    provinceOpen: false,\n    view: 'form',\n    summaryRows: [],\n    summaryLoading: false,\n    summaryError: '',\n    settings: null,\n    settingsDraft: null,\n    settingsSaved: false,\n    authed: false,\n    loginUser: '',\n    loginPass: '',\n    loginError: false,\n    pendingView: null,\n  };\n\n  AUTH_USER = 'OPM';\n  AUTH_PASS = 'Opminspection';\n\n  isAuthed() {\n    if (this.state.authed) return true;\n    try { return sessionStorage.getItem('opm_staff_auth') === '1'; } catch (e) { return false; }\n  }\n\n  requireAuth(target) {\n    if (this.isAuthed()) {\n      if (target === 'summary') { this.setState({ view: 'summary', provinceOpen: false }); this.loadSummary(); }\n      else this.openSettings();\n      return;\n    }\n    this.setState({ view: 'login', pendingView: target, loginUser: '', loginPass: '', loginError: false, provinceOpen: false });\n  }\n\n  setLoginUser(e) { const v = e.target.value; this.setState({ loginUser: v, loginError: false }); }\n  setLoginPass(e) { const v = e.target.value; this.setState({ loginPass: v, loginError: false }); }\n\n  doLogin() {\n    if (this.state.loginUser.trim() === this.AUTH_USER && this.state.loginPass === this.AUTH_PASS) {\n      try { sessionStorage.setItem('opm_staff_auth', '1'); } catch (e) {}\n      const target = this.state.pendingView || 'summary';\n      this.setState({ authed: true, loginError: false, loginPass: '' });\n      if (target === 'summary') { this.setState({ view: 'summary', provinceOpen: false }); this.loadSummary(); }\n      else this.openSettings();\n    } else {\n      this.setState({ loginError: true });\n    }\n  }\n\n  logout() {\n    try { sessionStorage.removeItem('opm_staff_auth'); } catch (e) {}\n    this.setState({ authed: false, view: 'form' });\n  }\n\n  cancelLogin() { this.setState({ view: 'form', pendingView: null, loginError: false }); }\n\n  defaultSettings() {\n    return {\n      orgName: this.props.orgName ?? 'สำนักนายกรัฐมนตรี',\n      meetingTitle: this.props.meetingTitle ?? 'แบบตอบรับการเข้าร่วมประชุมการตรวจราชการแบบบูรณาการ',\n      subtitle: this.props.subtitle ?? 'ของผู้ตรวจราชการสำนักนายกรัฐมนตรี และผู้ตรวจราชการกระทรวง',\n      budgetYear: this.props.budgetYear ?? '2569',\n      provinces: (this.props.provinces && this.props.provinces.length) ? this.props.provinces.slice() : ['นราธิวาส', 'ยะลา', 'ปัตตานี'],\n      scriptUrl: this.props.scriptUrl || this.scriptUrlDefault || '',\n      locationLabel: 'สถานที่จัดประชุม',\n      locationText: 'การตรวจราชการแบบบูรณาการ ณ จังหวัด{จังหวัด}',\n      sec1Title: 'ข้อมูลผู้ตรวจราชการ',\n      sec1Desc: 'ผู้ตรวจราชการสำนักนายกรัฐมนตรี / ผู้ตรวจราชการกระทรวง',\n      sec2Title: 'ข้อมูลผู้ประสานงาน',\n      sec2Desc: 'เจ้าหน้าที่ผู้ประสานงานของผู้ตรวจราชการ',\n      sec3Title: 'ผู้เข้าร่วมเพิ่มเติม',\n      sec3Desc: 'กรอกเฉพาะกรณีมีผู้ติดตามเข้าร่วมประชุม (ถ้ามี)',\n      submitLabel: 'ส่งแบบตอบรับ',\n      thankTitle: 'ระบบได้รับแบบตอบรับของท่านเรียบร้อยแล้ว',\n      thankBody: 'ขอขอบคุณที่ตอบรับการเข้าร่วมประชุมการตรวจราชการแบบบูรณาการ ประจำปีงบประมาณ พ.ศ. {ปี} เจ้าหน้าที่จะติดต่อกลับเพื่อยืนยันรายละเอียดอีกครั้ง',\n    };\n  }\n\n  loadSettings() {\n    const d = this.defaultSettings();\n    try {\n      const s = JSON.parse(localStorage.getItem('opm_form_settings') || 'null');\n      if (s && typeof s === 'object') {\n        return { ...d, ...s, provinces: (Array.isArray(s.provinces) && s.provinces.length) ? s.provinces : d.provinces, scriptUrl: s.scriptUrl || d.scriptUrl };\n      }\n    } catch (e) {}\n    return d;\n  }\n\n  cfg() { return this.state.settings || this.loadSettings(); }\n\n  openSettings() {\n    const draft = JSON.parse(JSON.stringify(this.cfg()));\n    this.setState({ view: 'settings', settingsDraft: draft, settingsSaved: false, provinceOpen: false });\n  }\n  cancelSettings() { this.setState({ view: 'form', settingsDraft: null }); }\n\n  setSettingField(k) { return (e) => { const v = e.target.value; this.setState((s) => ({ settingsDraft: { ...s.settingsDraft, [k]: v } })); }; }\n  setProvinceAt(i) { return (e) => { const v = e.target.value; this.setState((s) => { const provinces = s.settingsDraft.provinces.slice(); provinces[i] = v; return { settingsDraft: { ...s.settingsDraft, provinces } }; }); }; }\n  addProvince() { this.setState((s) => ({ settingsDraft: { ...s.settingsDraft, provinces: [...s.settingsDraft.provinces, ''] } })); }\n  removeProvince(i) { this.setState((s) => { const provinces = s.settingsDraft.provinces.filter((_, j) => j !== i); return { settingsDraft: { ...s.settingsDraft, provinces } }; }); }\n\n  saveSettings() {\n    const draft = this.state.settingsDraft;\n    const clean = { ...draft, provinces: (draft.provinces || []).map((p) => String(p).trim()).filter(Boolean) };\n    if (!clean.provinces.length) clean.provinces = ['นราธิวาส', 'ยะลา', 'ปัตตานี'];\n    try { localStorage.setItem('opm_form_settings', JSON.stringify(clean)); } catch (e) {}\n    const url = clean.scriptUrl || this.scriptUrlDefault || '';\n    if (url) {\n      try { fetch(url, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ __type: 'config', settings: clean }) }); } catch (e) {}\n    }\n    this.setState({ settings: clean, settingsDraft: clean, settingsSaved: true });\n    setTimeout(() => { this.setState((s) => (s.view === 'settings' ? { view: 'form', settingsSaved: false } : { settingsSaved: false })); }, 1100);\n  }\n\n  fetchRemoteConfig() {\n    const url = (this.state.settings && this.state.settings.scriptUrl) || this.props.scriptUrl || this.scriptUrlDefault || '';\n    if (!url) return;\n    fetch(url)\n      .then((r) => r.json())\n      .then((j) => {\n        if (j && j.config && typeof j.config === 'object' && Object.keys(j.config).length) {\n          const merged = { ...this.cfg(), ...j.config, provinces: (Array.isArray(j.config.provinces) && j.config.provinces.length) ? j.config.provinces : this.cfg().provinces };\n          try { localStorage.setItem('opm_form_settings', JSON.stringify(merged)); } catch (e) {}\n          this.setState({ settings: merged });\n        }\n      })\n      .catch(() => {});\n  }\n\n  openSummary() { this.setState({ view: 'summary', provinceOpen: false }); this.loadSummary(); }\n  closeSummary() { this.setState({ view: 'form' }); }\n\n  exportExcel() {\n    const rows = this.state.summaryRows || [];\n    if (!rows.length) return;\n    const esc = (v) => String(v == null ? '' : v).replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;');\n    const fmt = (d) => { try { return d ? new Date(d).toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' }) : ''; } catch (e) { return String(d || ''); } };\n    const headers = ['ลำดับ', 'ปีงบประมาณ (พ.ศ.)', 'ผู้ตรวจราชการกระทรวง', 'ชื่อ-สกุล (ผู้ตรวจฯ)', 'หน่วยงาน', 'หมายเลขโทรศัพท์', 'จังหวัดที่เข้าร่วม', 'วัน/เดือน/ปี ที่เข้าร่วม', 'ผู้ประสานงาน', 'ตำแหน่ง', 'เบอร์โทร', 'หมายเหตุ', 'ผู้เข้าร่วมเพิ่มเติม', 'ตำแหน่ง', 'หน่วยงาน', 'เบอร์โทร', 'หมายเหตุ', 'เวลาบันทึก'];\n    let body = '';\n    rows.forEach((r, i) => {\n      const cells = [i + 1, r.budgetYear, r.inspector, r.name, r.agency, r.phone, r.province, r.date, r.coordName, r.coordPos, r.coordPhone, r.coordNote, r.addName, r.addPos, r.addAgency, r.addPhone, r.addNote, fmt(r.submittedAt)];\n      body += '<tr>' + cells.map((c) => '<td style=\"mso-number-format:\\'\\\\@\\'\">' + esc(c) + '<\u002Ftd>').join('') + '<\u002Ftr>';\n    });\n    const thStyle = 'background:#16245d;color:#fff;font-weight:bold;border:1px solid #999;';\n    const html = '<html xmlns:o=\"urn:schemas-microsoft-com:office:office\" xmlns:x=\"urn:schemas-microsoft-com:office:excel\" xmlns=\"http://www.w3.org/TR/REC-html40\"><head><meta charset=\"utf-8\"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>แบบตอบรับ<\u002Fx:Name><x:WorksheetOptions><x:DisplayGridlines/><\u002Fx:WorksheetOptions><\u002Fx:ExcelWorksheet><\u002Fx:ExcelWorksheets><\u002Fx:ExcelWorkbook><\u002Fxml><![endif]--><\u002Fhead><body><table border=\"1\" style=\"border-collapse:collapse;font-family:Sarabun,sans-serif;\"><thead><tr>' + headers.map((h) => '<th style=\"' + thStyle + '\">' + esc(h) + '<\u002Fth>').join('') + '<\u002Ftr><\u002Fthead><tbody>' + body + '<\u002Ftbody><\u002Ftable><\u002Fbody><\u002Fhtml>';\n    const blob = new Blob(['\\ufeff' + html], { type: 'application/vnd.ms-excel;charset=utf-8' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    const ts = new Date().toISOString().slice(0, 10);\n    a.href = url;\n    a.download = 'รายชื่อผู้ตอบรับ_' + ts + '.xls';\n    document.body.appendChild(a);\n    a.click();\n    document.body.removeChild(a);\n    setTimeout(() => URL.revokeObjectURL(url), 1500);\n  }\n\n  loadSummary() {\n    const local = () => { try { return JSON.parse(localStorage.getItem('opm_meeting_responses') || '[]'); } catch (e) { return []; } };\n    const url = this.cfg().scriptUrl || '';\n    this.setState({ summaryLoading: true, summaryError: '' });\n    if (!url) {\n      this.setState({ summaryRows: local().slice().reverse(), summaryLoading: false });\n      return;\n    }\n    fetch(url)\n      .then((r) => r.json())\n      .then((j) => {\n        const rows = (j && j.rows) ? j.rows : [];\n        this.setState({ summaryRows: rows.slice().reverse(), summaryLoading: false });\n      })\n      .catch(() => {\n        this.setState({ summaryRows: local().slice().reverse(), summaryLoading: false, summaryError: 'ไม่สามารถเชื่อมต่อ Google Sheet ได้ จึงแสดงข้อมูลที่สำรองไว้ในเครื่องนี้แทน' });\n      });\n  }\n\n  provinceRef = React.createRef();\n\n  onDocClick = (e) => {\n    if (this.state.provinceOpen && this.provinceRef.current && !this.provinceRef.current.contains(e.target)) {\n      this.setState({ provinceOpen: false });\n    }\n  };\n\n  componentDidMount() {\n    document.addEventListener('mousedown', this.onDocClick);\n    this.setState({ settings: this.loadSettings() });\n    this.fetchRemoteConfig();\n  }\n  componentWillUnmount() { document.removeEventListener('mousedown', this.onDocClick); }\n\n  toggleProvince(name) {\n    this.setState((s) => {\n      const cur = Array.isArray(s.form.province) ? s.form.province : [];\n      const next = cur.includes(name) ? cur.filter((p) => p !== name) : [...cur, name];\n      const form = { ...s.form, province: next };\n      let errors = s.errors;\n      if (s.attempted && errors.province && next.length) { errors = { ...s.errors }; delete errors.province; }\n      return { form, errors };\n    });\n  }\n\n  required = ['inspector','name','agency','phone','province','date','coordName','coordPhone'];\n\n  scriptUrlDefault = 'https://script.google.com/macros/s/AKfycbzyS9bMw34uTNfE6nag9R-WrwtyjYPY9P6nU9YXB0lIeS61bypmIGSXkwozqpmv2xSu/exec';\n\n  set(k) {\n    return (e) => {\n      const v = e.target.value;\n      this.setState((s) => {\n        const form = { ...s.form, [k]: v };\n        let errors = s.errors;\n        if (s.attempted && errors[k] && String(v).trim()) {\n          errors = { ...s.errors };\n          delete errors[k];\n        }\n        return { form, errors };\n      });\n    };\n  }\n\n  submit() {\n    const f = this.state.form;\n    const errors = {};\n    this.required.forEach((k) => { if (!String(f[k] || '').trim()) errors[k] = true; });\n    if (Object.keys(errors).length) {\n      this.setState({ errors, attempted: true });\n      return;\n    }\n    const effYear = this.state.yearOverride ?? this.cfg().budgetYear ?? '2569';\n    const payload = { ...f, province: Array.isArray(f.province) ? f.province.join(', ') : f.province, budgetYear: effYear, submittedAt: new Date().toISOString() };\n    try {\n      const all = JSON.parse(localStorage.getItem('opm_meeting_responses') || '[]');\n      all.push(payload);\n      localStorage.setItem('opm_meeting_responses', JSON.stringify(all));\n    } catch (e) {}\n    const url = this.cfg().scriptUrl || '';\n    if (url) {\n      try {\n        fetch(url, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(payload) });\n      } catch (e) {}\n    }\n    this.setState({ submitted: true });\n    try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) {}\n  }\n\n  reset() {\n    this.setState({\n      form: { inspector:'', name:'', agency:'', phone:'', province:[], date:'', coordName:'', coordPos:'', coordPhone:'', coordNote:'', addName:'', addPos:'', addAgency:'', addPhone:'', addNote:'' },\n      errors: {}, submitted: false, attempted: false, provinceOpen: false,\n    });\n  }\n\n  renderVals() {\n    const f = this.state.form;\n    const cfg = this.cfg();\n    const provinces = cfg.provinces;\n    const handlers = {};\n    Object.keys(f).forEach((k) => { handlers[k] = this.set(k); });\n    handlers.setYear = (e) => this.setState({ yearOverride: e.target.value });\n    const budgetYear = this.state.yearOverride ?? (cfg.budgetYear ?? '2569');\n    const baseYear = parseInt(budgetYear, 10) || 2569;\n    const startYear = baseYear - 2;\n    const yearOptions = [];\n    for (let i = 0; i < 8; i++) yearOptions.push(String(startYear + i));\n    if (!yearOptions.includes(String(budgetYear))) yearOptions.unshift(String(budgetYear));\n    const selected = Array.isArray(f.province) ? f.province : [];\n    const provinceOptions = provinces.map((p) => ({ name: p, checked: selected.includes(p), toggle: () => this.toggleProvince(p) }));\n    const provinceLabel = selected.length ? selected.join(', ') : '— เลือกจังหวัด —';\n    const provinceLabelStyle = selected.length ? '' : 'color:#a9a496;';\n    const provincesText = provinces.length > 1\n      ? provinces.slice(0, -1).join(' ') + ' และ' + provinces[provinces.length - 1]\n      : (provinces[0] || '');\n    return {\n      values: f,\n      handlers,\n      errors: this.state.errors,\n      provinceOptions,\n      provinceLabel,\n      provinceLabelStyle,\n      provinceOpen: this.state.provinceOpen,\n      provinceRef: this.provinceRef,\n      toggleProvincePopup: () => this.setState((s) => ({ provinceOpen: !s.provinceOpen })),\n      provincesText,\n      submit: () => this.submit(),\n      reset: () => this.reset(),\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      isForm: this.state.view === 'form',\n      isSummary: this.state.view === 'summary',\n      isSettings: this.state.view === 'settings',\n      isLogin: this.state.view === 'login',\n      openSummary: () => this.requireAuth('summary'),\n      closeSummary: () => this.closeSummary(),\n      openSettingsGated: () => this.requireAuth('settings'),\n      logout: () => this.logout(),\n      loginUser: this.state.loginUser,\n      loginPass: this.state.loginPass,\n      loginError: this.state.loginError,\n      setLoginUser: (e) => this.setLoginUser(e),\n      setLoginPass: (e) => this.setLoginPass(e),\n      doLogin: () => this.doLogin(),\n      cancelLogin: () => this.cancelLogin(),\n      loginTargetLabel: this.state.pendingView === 'settings' ? 'ตั้งค่าแบบฟอร์ม' : 'สรุปรายชื่อผู้ตอบรับ',\n      openSettings: () => this.openSettings(),\n      cancelSettings: () => this.cancelSettings(),\n      saveSettings: () => this.saveSettings(),\n      settingsSaved: this.state.settingsSaved,\n      draft: this.state.settingsDraft || {},\n      draftHandlers: (() => {\n        const keys = ['orgName', 'meetingTitle', 'subtitle', 'budgetYear', 'scriptUrl', 'locationLabel', 'locationText', 'sec1Title', 'sec1Desc', 'sec2Title', 'sec2Desc', 'sec3Title', 'sec3Desc', 'submitLabel', 'thankTitle', 'thankBody'];\n        const h = {};\n        keys.forEach((k) => { h[k] = this.setSettingField(k); });\n        return h;\n      })(),\n      addProvince: () => this.addProvince(),\n      provinceEditors: ((this.state.settingsDraft && this.state.settingsDraft.provinces) || []).map((p, i) => ({\n        value: p,\n        onChange: this.setProvinceAt(i),\n        remove: () => this.removeProvince(i),\n      })),\n      refreshSummary: () => this.loadSummary(),\n      exportExcel: () => this.exportExcel(),\n      summaryLoading: this.state.summaryLoading,\n      summaryError: this.state.summaryError,\n      summaryHasError: !!this.state.summaryError,\n      summaryCount: this.state.summaryRows.length,\n      summaryEmpty: !this.state.summaryLoading && this.state.summaryRows.length === 0,\n      summaryHasRows: !this.state.summaryLoading && this.state.summaryRows.length > 0,\n      summaryRowsView: this.state.summaryRows.map((r, i) => {\n        let stamp = '';\n        try { stamp = r.submittedAt ? new Date(r.submittedAt).toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' }) : ''; } catch (e) { stamp = String(r.submittedAt || ''); }\n        return {\n          idx: i + 1,\n          inspector: r.inspector || '-',\n          name: r.name || '-',\n          agency: r.agency || '-',\n          phone: r.phone || '-',\n          province: r.province || '-',\n          date: r.date || '-',\n          coordName: r.coordName || '-',\n          coordPhone: r.coordPhone || '-',\n          budgetYear: r.budgetYear || '-',\n          stamp: stamp || '-',\n        };\n      }),\n      hasError: Object.keys(this.state.errors).length > 0,\n      budgetYear,\n      yearOptions,\n      meetingTitle: cfg.meetingTitle,\n      subtitle: cfg.subtitle,\n      orgName: cfg.orgName,\n      locationLabel: cfg.locationLabel,\n      locationText: (cfg.locationText || '').replace('{จังหวัด}', provincesText),\n      sec1Title: cfg.sec1Title,\n      sec1Desc: cfg.sec1Desc,\n      sec2Title: cfg.sec2Title,\n      sec2Desc: cfg.sec2Desc,\n      sec3Title: cfg.sec3Title,\n      sec3Desc: cfg.sec3Desc,\n      submitLabel: cfg.submitLabel,\n      thankTitle: cfg.thankTitle,\n      thankBody: (cfg.thankBody || '').replace('{ปี}', budgetYear),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
